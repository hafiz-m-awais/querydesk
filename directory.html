<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QueryDesk — Course Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --g1: #1f946b; --g2: #0d5b42; --g3: #062d21;
  --gl: #eafaf4; --gm: #b7e9d2;
  --border: #d8ddd8; --gray: #f7f6f2;
  --text: #1c2320; --ts: #4e5954; --th: #79837f;
  --white: #fff;
  --r: 12px; --rl: 20px;
  --shadow: 0 18px 40px rgba(10, 26, 18, .12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 0%, #d2f1e0 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, #d5e8ff 0%, transparent 55%),
    #f4f2eb;
  background-attachment: fixed;
  color: var(--text);
  padding: 2rem 1rem 4rem;
}
.page-wrap { max-width: 760px; margin: 0 auto; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.top-bar .uni { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--ts); text-transform: uppercase; }

/* Header card */
.header-card {
  background: linear-gradient(135deg, var(--g3) 0%, var(--g2) 100%);
  border-radius: var(--rl); padding: 2.1rem 2rem 1.5rem;
  margin-bottom: 1.5rem; box-shadow: var(--shadow);
}
.header-card h1 { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; letter-spacing: -.02em; color: #fff; }
.header-card p  { font-size: 13px; color: rgba(255,255,255,.65); margin-top: 5px; line-height: 1.6; }
.header-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; background: rgba(255,255,255,.14); color: rgba(255,255,255,.9); border: 1px solid rgba(255,255,255,.2); margin-top: 12px; }

/* Term section header */
.term-label { font-size: 11px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--ts); margin: 1.5rem 0 .75rem; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* Course cards grid */
.courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

.course-card {
  background: var(--white); border-radius: var(--rl);
  box-shadow: var(--shadow); overflow: hidden;
  border: 1px solid rgba(255,255,255,.45);
  display: flex; flex-direction: column;
  backdrop-filter: blur(2px);
}
.course-card-head {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--gray);
}
.course-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; }
.instructor  { font-size: 12px; color: var(--ts); margin-top: 4px; }
.sections-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.sec-badge { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 99px; background: var(--gl); color: var(--g2); border: 1px solid var(--gm); }
.course-card-body { padding: 14px 18px; flex: 1; display: flex; align-items: flex-end; gap: 9px; }
.btn-submit {
  flex: 1; background: linear-gradient(135deg, #1f946b, #0d5b42); color: #fff; border: none;
  border-radius: var(--r); padding: 10px 16px; font-size: 13px;
  font-weight: 700; cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: filter .15s;
}
.btn-submit:hover { filter: brightness(1.04); }
.btn-admin {
  background: none; border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 10px 13px; font-size: 12px; color: var(--ts); cursor: pointer;
  text-decoration: none; display: inline-flex; align-items: center;
  transition: background .15s;
}
.btn-admin:hover { background: var(--gray); }

/* Empty state */
.empty { text-align: center; padding: 3rem; color: var(--th); font-size: 14px; }

/* No-courses notice */
.notice {
  background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 16px 20px; font-size: 13px; color: var(--ts); margin-top: 1rem;
}
.notice code { background: var(--gray); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; font-size: 12px; }

/* Instructor CTA */
.instructor-cta {
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  margin-top: 1.5rem; padding: 13px 18px;
  background: var(--white); border-radius: var(--r);
  border: 1.5px solid var(--border); box-shadow: var(--shadow);
  font-size: 13px; color: var(--ts);
}
.instructor-cta a { color: var(--g1); font-weight: 700; text-decoration: none; }
.instructor-cta a:hover { text-decoration: underline; }

@media (max-width: 520px) {
  .courses-grid { grid-template-columns: 1fr; }
  .header-card { padding: 1.5rem; }
}
</style>
</head>
<body>
<div class="page-wrap">

  <div class="top-bar">
    <span class="uni"></span>
  </div>

  <div class="header-card">
    <h1>QueryDesk</h1>
    <p>Select your course below to submit a query or check your query status.<br>
       Each course is managed independently by its instructor.</p>
    
  </div>

  <div id="directory"></div>

  <div class="instructor-cta">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--g1)"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span>Are you an instructor? Set up QueryDesk for your own course —&nbsp;</span>
    <a href="setup.html">get started in 10 minutes &rarr;</a>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  COURSE DIRECTORY — fetches live from REST API /courses
// ═══════════════════════════════════════════════════════════════

var API_BASE = 'https://querydesk.onrender.com';
// Allow ?api=http://localhost:8000 override for local dev
(function() {
  var qs = new URLSearchParams(location.search).get('api');
  if (qs) API_BASE = qs.replace(/\/$/, '');
})();

// ── Fallback seed courses (shown when API is unreachable) ──────
var COURSES_FALLBACK = [];

// ── Fetch from REST API or fall back ─────────────────────────
function fetchAndRender() {
  var dir = document.getElementById('directory');
  dir.innerHTML = '<div class="empty" style="padding:2rem;color:var(--th)">Loading courses\u2026</div>';

  fetch(API_BASE + '/courses')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      var courses = data.items && data.items.length ? data.items : COURSES_FALLBACK;
      render(courses);
    })
    .catch(function() { render(COURSES_FALLBACK); });
}

// ── Group courses by term then render ─────────────────────────
function render(courses) {
  var dir = document.getElementById('directory');

  if (!courses || !courses.length) {
    dir.innerHTML = '<div class="empty">No courses listed yet.<br><span style="font-size:12px">Instructors can add courses via the admin dashboard.</span></div>';
    return;
  }

  // Group by semester/term
  var byTerm = {};
  courses.forEach(function(c) {
    var t = c.semester || 'Current Term';
    if (!byTerm[t]) byTerm[t] = [];
    byTerm[t].push(c);
  });

  var html = '';
  Object.keys(byTerm).forEach(function(term) {
    html += '<div class="term-label">' + esc(term) + '</div>';
    html += '<div class="courses-grid">';
    byTerm[term].forEach(function(c) {
      var studentLink = 'index.html?course=' + encodeURIComponent(c.id);
      var adminLink   = 'admin.html';
      var isOpen      = c.submission_open !== false;
      html += '<div class="course-card">'
        + '<div class="course-card-head">'
        +   '<div class="course-name">' + esc(c.name) + '</div>'
        +   '<div class="instructor">'
        +     '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px;margin-right:4px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'
        +     esc(c.instructor_name || 'Instructor')
        +   '</div>'
        + '</div>'
        + '<div class="course-card-body">'
        +   (isOpen
              ? '<a class="btn-submit" href="' + studentLink + '">'
                + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
                + 'Submit a query'
                + '</a>'
              : '<span class="btn-submit" style="opacity:.45;cursor:default">Submissions closed</span>')
        +   '<a class="btn-admin" href="' + adminLink + '" title="Instructor login">'
        +     '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>'
        +   '</a>'
        + '</div>'
        + '</div>';
    });
    html += '</div>';
  });

  dir.innerHTML = html;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

fetchAndRender();
</script>
</body>
</html>
